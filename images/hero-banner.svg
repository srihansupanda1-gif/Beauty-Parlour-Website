<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Luxe Glow Beauty Studio Banner</title>
  <desc id="desc">A bright neon beauty studio banner with gradient shapes and modern typography.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150629"/>
      <stop offset="40%" stop-color="#210d3f"/>
      <stop offset="100%" stop-color="#090816"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4ecb"/>
      <stop offset="50%" stop-color="#6e7dff"/>
      <stop offset="100%" stop-color="#2af7d0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGradient)" />
  <circle cx="420" cy="220" r="210" fill="#ff4ecb" fill-opacity="0.12"/>
  <circle cx="1630" cy="220" r="180" fill="#2af7d0" fill-opacity="0.12"/>
  <ellipse cx="1480" cy="750" rx="520" ry="280" fill="#6e7dff" fill-opacity="0.08"/>
  <path d="M200,840 C420,780 520,500 860,540 C1180,580 1280,860 1540,820 C1680,800 1780,680 1920,640 L1920,1080 L0,1080 Z" fill="#ff4ecb" fill-opacity="0.08"/>
  <g filter="url(#glow)">
    <ellipse cx="1120" cy="320" rx="220" ry="120" fill="#ff4ecb" fill-opacity="0.25"/>
    <ellipse cx="640" cy="760" rx="240" ry="140" fill="#2af7d0" fill-opacity="0.18"/>
  </g>
  <g fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <circle cx="330" cy="250" r="98"/>
    <circle cx="1650" cy="210" r="72"/>
    <circle cx="1220" cy="630" r="86"/>
  </g>
  <g transform="translate(260 220)">
    <rect x="0" y="0" width="320" height="180" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="28" y="28" width="120" height="16" rx="8" fill="#ff4ecb"/>
    <rect x="28" y="62" width="220" height="12" rx="6" fill="rgba(249,250,255,0.3)"/>
    <rect x="28" y="88" width="180" height="12" rx="6" fill="rgba(249,250,255,0.2)"/>
  </g>
  <g transform="translate(1280 760)">
    <rect x="0" y="0" width="280" height="140" rx="30" fill="rgba(42,247,208,0.12)"/>
    <circle cx="60" cy="70" r="22" fill="#2af7d0"/>
    <circle cx="140" cy="50" r="14" fill="#6e7dff"/>
    <circle cx="220" cy="90" r="18" fill="#ff4ecb"/>
  </g>
  <text x="180" y="340" font-size="90" font-weight="800" letter-spacing="-2" fill="url(#accentGradient)">
    Luxe Glow
  </text>
  <text x="180" y="440" font-size="36" font-weight="600" fill="#f9faff" opacity="0.9">
    Beauty Studio & Salon Experience
  </text>
  <text x="180" y="560" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Reveal Your Best Self
  </text>
  <text x="180" y="640" font-size="24" fill="#f9faff" opacity="0.78" letter-spacing="0.4">
    Premium beauty, skincare, makeup and salon services for modern style seekers.
  </text>
  <g fill="#ffffff" opacity="0.72">
    <circle cx="1710" cy="120" r="7"/>
    <circle cx="1768" cy="180" r="5"/>
    <circle cx="1750" cy="60" r="4"/>
    <circle cx="1755" cy="150" r="3"/>
  </g>
  <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2">
    <path d="M1540 380 C1560 330 1600 310 1640 320"/>
    <path d="M1780 500 C1800 450 1850 430 1890 460"/>
  </g>
</svg>
